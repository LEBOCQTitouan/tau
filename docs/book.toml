[book]
title = "tau"
description = "tau — agentic Rust runtime. Documentation."
authors = ["tau contributors"]
language = "en"
multilingual = false
src = "."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/titouanlebocq/tau"
edit-url-template = "https://github.com/titouanlebocq/tau/edit/main/docs/{path}"
no-section-label = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.linkcheck]
follow-web-links = false
# v1 ships with warn-only because existing ADRs contain pre-existing
# link debt: `[ignore]` reference-link false positives in prose, dead
# refs to spec/plan files that were never committed, and `../` links
# outside the docs/ root (e.g. CLAUDE.md). Linkcheck still runs and
# surfaces those in CI logs; tightening to "error" is a follow-up
# after the link debt is cleaned up.
warning-policy = "warn"
traverse-parent-directories = true
