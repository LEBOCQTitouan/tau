[workspace]
resolver = "2"
members = [
    "crates/tau-domain",
    "crates/tau-ports",
    "crates/tau-infra",
    "crates/tau-app",
    "crates/tau-pkg",
    "crates/tau-observe",
    "crates/tau-runtime",
    "crates/tau-cli",
]

[workspace.package]
version = "0.0.0"
edition = "2021"
rust-version = "1.91"
license = "MIT OR Apache-2.0"
repository = "https://github.com/LEBOCQTitouan/tau"
authors = ["Titouan Lebocq <75916953+LEBOCQTitouan@users.noreply.github.com>"]

[workspace.dependencies]
thiserror = "2"
semver    = { version = "1" }
uuid      = { version = "1", features = ["v7"] }
url       = "2"
serde     = { version = "1", features = ["derive"] }
base64    = "0.22"
proptest  = "1"
walkdir   = "2"
