name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable cargo's incremental compilation in CI. CI runs are fresh
  # each time; the Swatinem/rust-cache action restores `target/` and
  # `~/.cargo/{registry,git}` from the most recent main-branch run, so
  # cargo's *between-runs* caching is provided by the action. Disabling
  # incremental within a run makes outputs more deterministic for the
  # cache and avoids the sccache+incremental conflict (incremental
  # compilation embeds compilation-state metadata that sccache can't
  # deduplicate).
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          shared-key: linux-stable
          with-mold: true
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-stable:
    name: test-stable / ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          shared-key: ${{ matrix.os }}-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - run: cargo nextest run --workspace --all-targets
      - run: cargo test --workspace --doc

  msrv-check:
    name: msrv-check / ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.91"
          shared-key: ${{ matrix.os }}-1.91
          with-sccache: true
          with-mold: true
      - run: cargo check --workspace --all-targets --locked

  test-fixtures-ports:
    name: test-fixtures-ports / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Test tau-ports (test-fixtures feature only)
        run: cargo nextest run -p tau-ports --features test-fixtures

  feature-flag-matrix:
    name: feature-flag-matrix / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - name: Check each crate with --no-default-features
        run: |
          set -e
          for crate in tau-domain tau-ports tau-pkg tau-runtime tau-cli tau-plugin-protocol tau-plugin-sdk; do
            echo "::group::$crate"
            cargo check -p "$crate" --no-default-features
            echo "::endgroup::"
          done

  build-fixtures-linux:
    name: build-fixtures / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build all release-mode binaries
        run: |
          cargo build --release \
            -p anthropic -p ollama -p openai \
            -p fs-read -p shell \
            -p echo-llm -p echo-tool \
            -p tau-cli
      - name: Build controlled-env binary
        run: |
          cargo build --release \
            --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml
      - name: Stage binaries into flat _artifacts directory
        # actions/upload-artifact@v4 preserves directory structure relative
        # to the workspace root. Without this staging step, downstream jobs
        # would see binaries under ./prebuilt/target/release/ and
        # ./prebuilt/crates/.../target/release/ — different roots break the
        # uniform `mv ./prebuilt/<name>` pattern downstream. Flattening into
        # _artifacts/ gives consumers a single predictable path.
        run: |
          mkdir -p _artifacts
          cp target/release/anthropic-plugin _artifacts/
          cp target/release/ollama-plugin _artifacts/
          cp target/release/openai-plugin _artifacts/
          cp target/release/fs-read-plugin _artifacts/
          cp target/release/shell-plugin _artifacts/
          cp target/release/echo-llm _artifacts/
          cp target/release/echo-tool _artifacts/
          cp target/release/tau _artifacts/
          cp crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env _artifacts/
      - name: Upload fixture binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-fixture-binaries
          retention-days: 1
          path: _artifacts/

  build-tau-plugin-test-support:
    name: build (tau-plugin-test-support)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-test-support
        run: cargo build -p tau-plugin-test-support
      - name: Test tau-plugin-test-support
        run: cargo nextest run -p tau-plugin-test-support --all-targets

  build-tau-plugin-conformance:
    name: build (tau-plugin-conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-conformance
        run: cargo build -p tau-plugin-conformance

  test-conformance:
    name: test (conformance)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place plugin binaries
        run: |
          mkdir -p target/release
          mv ./prebuilt/anthropic-plugin ./prebuilt/ollama-plugin ./prebuilt/openai-plugin \
             target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x target/release/anthropic-plugin target/release/ollama-plugin target/release/openai-plugin
          touch target/release/anthropic-plugin target/release/ollama-plugin target/release/openai-plugin
      - name: Run conformance suite against all 3 plugins
        run: |
          cargo nextest run -p anthropic --test conformance --no-capture
          cargo nextest run -p ollama    --test conformance --no-capture
          cargo nextest run -p openai    --test conformance --no-capture

  build-tau-plugin-compat:
    name: build (tau-plugin-compat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-compat
        run: cargo build -p tau-plugin-compat
      - name: Build tau-plugin-compat (integration-tests feature)
        run: cargo build -p tau-plugin-compat --features integration-tests --tests

  test-tau-plugin-compat:
    name: test (tau-plugin-compat / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place binaries at cargo-expected paths
        run: |
          mkdir -p target/release
          mv ./prebuilt/anthropic-plugin ./prebuilt/ollama-plugin ./prebuilt/openai-plugin \
             ./prebuilt/fs-read-plugin ./prebuilt/shell-plugin \
             ./prebuilt/echo-llm ./prebuilt/echo-tool \
             ./prebuilt/tau \
             target/release/
          mkdir -p crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release
          mv ./prebuilt/tau-controlled-env \
             crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x target/release/* \
                   crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
          # Touch to bump mtime above source files so cargo's freshness
          # check doesn't decide to rebuild.
          touch target/release/* \
                crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
      - name: Build tau binary (debug)
        # Layer 3 tests at crates/tau-plugin-compat/tests/layer3_check_sandbox.rs
        # hardcode the debug binary path (target/debug/tau). Build it here;
        # the 5 release plugin binaries still come from the artifact, which
        # is where the bulk of the time savings come from.
        run: cargo build -p tau-cli --bin tau
      - name: Test tau-plugin-compat (integration-tests feature)
        run: cargo nextest run -p tau-plugin-compat --features integration-tests --tests --verbose

  test-tau-sandbox-native-e2e:
    name: test (tau-sandbox-native e2e / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place controlled-env binary
        run: |
          mkdir -p crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release
          mv ./prebuilt/tau-controlled-env \
             crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
          touch crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
      - name: Test tau-sandbox-native e2e
        # strict_net_filter tests need CAP_NET_ADMIN-in-userns to set up
        # the veth pair + nftables ruleset (sub-project F task 6.5). They
        # run in the dedicated test-net-filter / linux job inside privileged
        # Docker; this non-privileged runner skips them via nextest filter.
        run: cargo nextest run -p tau-sandbox-native --features integration-tests --tests --verbose -E 'not binary(strict_net_filter)'

  test-net-filter:
    name: test-net-filter / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run net-filter tests inside privileged Docker
        # Phase 0 verification (sub-project F) confirmed GHA host runners
        # block uid_map writes. Privileged Docker container has full root +
        # CAP_NET_ADMIN-in-userns, so the per-host filter setup works.
        # F task 6.5 wired apply_post_spawn through; this job now actually
        # runs the strict_net_filter integration tests end-to-end.
        run: |
          docker run --rm --privileged \
            -v "$PWD":/workspace \
            -w /workspace \
            rust:1.82-bookworm \
            bash -c '
              set -e
              apt-get update -qq
              apt-get install -y -qq iproute2 nftables
              cargo test -p tau-sandbox-native --lib net_filter
              cargo test -p tau-sandbox-native --features integration-tests --test strict_net_filter
            '

  test-tau-runtime-e2e:
    name: test (tau-runtime e2e / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place controlled-env binary
        run: |
          mkdir -p crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release
          mv ./prebuilt/tau-controlled-env \
             crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
          touch crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
      - name: Test tau-runtime e2e
        run: cargo nextest run -p tau-runtime --features integration-tests --tests --verbose
