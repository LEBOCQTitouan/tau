name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Skip the full Rust matrix on pure-docs PRs. Branch protection
    # should require the ci-summary job (defined at the end of this
    # file), which reports success when all real jobs pass OR when
    # they all skip (the docs-only case). Docs-only PRs still get the
    # docs-check workflow as a gate.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs-*.yml'
  merge_group:
    # Merge-queue runs. Same paths-ignore semantics — the queue tests
    # the candidate merge against main; pure-docs PRs skip the matrix
    # and ci-summary's grace-period logic reports success. The
    # `merge_group` event does not accept a `branches:` filter; the
    # queue itself only exists for branches that opt in.
    types: [checks_requested]

# Cancel superseded runs on the same ref EXCEPT on main, where the
# Swatinem rust-cache save-step only runs (see
# .github/actions/setup-rust/action.yml `save-if`). Cancelling a
# main run mid-cache-write means the cache write never completes
# and subsequent PRs restore from a stale cache.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable cargo's incremental compilation in CI. CI runs are fresh
  # each time; the Swatinem/rust-cache action restores `target/` and
  # `~/.cargo/{registry,git}` from the most recent main-branch run, so
  # cargo's *between-runs* caching is provided by the action. Disabling
  # incremental within a run makes outputs more deterministic for the
  # cache and avoids the sccache+incremental conflict (incremental
  # compilation embeds compilation-state metadata that sccache can't
  # deduplicate).
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  changes:
    # Detect whether the PR is safe to fast-path (skip the heavy
    # integration jobs: build-fixtures-linux, test-conformance,
    # test-tau-plugin-compat, the two e2e jobs).
    #
    # A PR is fast-pathable when BOTH conditions hold:
    #   (1) every changed file is in the safe set — tests/benches,
    #       per-crate Cargo.toml, or Cargo.lock; AND
    #   (2) at least one tests/benches file actually changed.
    #
    # Condition (1) keeps source-code changes out of the fast path.
    # Condition (2) prevents a Cargo.toml-only PR (e.g. a runtime dep
    # bump with no test changes) from skipping the integration jobs —
    # the path filter can't tell a dev-dep add from a runtime-dep
    # bump, so the test-file requirement is the conservative gate.
    #
    # Workspace-root Cargo.toml is intentionally NOT in the safe set
    # (workspace deps can affect many crates). Pattern `crates/**/Cargo.toml`
    # matches per-crate manifests only.
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      skip_heavy_jobs: ${{ steps.compute.outputs.skip_heavy_jobs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: only_safe_paths
        with:
          # `every` → flag is true iff every changed file matches.
          predicate-quantifier: 'every'
          filters: |
            ok:
              - 'crates/**/tests/**'
              - 'crates/**/benches/**'
              - 'crates/**/Cargo.toml'
              - 'Cargo.lock'
      - uses: dorny/paths-filter@v4
        id: any_test_change
        with:
          # default `some` → flag is true if any changed file matches.
          filters: |
            ok:
              - 'crates/**/tests/**'
              - 'crates/**/benches/**'
      - id: compute
        env:
          ONLY_SAFE: ${{ steps.only_safe_paths.outputs.ok }}
          HAS_TEST: ${{ steps.any_test_change.outputs.ok }}
        run: |
          if [ "$ONLY_SAFE" = "true" ] && [ "$HAS_TEST" = "true" ]; then
            echo "skip_heavy_jobs=true" >> "$GITHUB_OUTPUT"
            echo "Fast-path eligible: tests + (optionally) dev-dep manifest changes only."
          else
            echo "skip_heavy_jobs=false" >> "$GITHUB_OUTPUT"
            echo "Full matrix: only_safe=$ONLY_SAFE, has_test=$HAS_TEST."
          fi

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          shared-key: linux-stable
          with-mold: true
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    name: cargo-deny / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # check advisories + licenses + bans + sources per deny.toml at repo root.
          arguments: --all-features

  test-stable:
    name: test-stable / ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          shared-key: ${{ matrix.os }}-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - run: cargo nextest run --profile ci --workspace --all-targets

  doc-tests:
    name: doc-tests / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      # Doctests are serial-per-binary in cargo and don't exercise
      # OS-specific paths in this workspace. Linux-only run is enough.
      - run: cargo test --workspace --doc

  msrv-check:
    # MSRV is a rustc-version property, not an OS property. The only
    # cfg(target_os)-gated code in this workspace lives in
    # tau-sandbox-windows (scaffold) and tau-sandbox-darwin (real),
    # both already covered by `test-stable` on their native OS.
    # Cross-OS MSRV signal is not worth the ~14 Linux-equivalent
    # runner minutes per CI run.
    name: msrv-check / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.91"
          shared-key: linux-1.91
          with-sccache: true
          with-mold: true
      - run: cargo check --workspace --all-targets --locked

  test-fixtures-ports:
    name: test-fixtures-ports / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Test tau-ports (test-fixtures feature only)
        run: cargo nextest run --profile ci -p tau-ports --features test-fixtures
      - name: Doctests tau-ports (test-fixtures feature only)
        # Workspace-level `cargo test --workspace --doc` (test-stable job)
        # runs doctests without features; the fixtures module is gated
        # behind `test-fixtures`, so its doctests only compile here.
        run: cargo test --doc -p tau-ports --features test-fixtures

  feature-flag-matrix:
    name: feature-flag-matrix / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - name: Check each crate with --no-default-features
        run: |
          set -e
          for crate in tau-domain tau-ports tau-pkg tau-runtime tau-cli tau-plugin-protocol tau-plugin-sdk; do
            echo "::group::$crate"
            cargo check -p "$crate" --no-default-features
            echo "::endgroup::"
          done

  build-fixtures-linux:
    # Skip on tests-only PRs — downstream integration jobs that consume
    # these binaries are also gated below. fmt/clippy/msrv/test-stable
    # still run.
    name: build-fixtures / linux
    needs: changes
    if: needs.changes.outputs.skip_heavy_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build all release-mode binaries
        run: |
          cargo build --release \
            -p anthropic -p ollama -p openai \
            -p fs-read -p shell \
            -p echo-llm -p echo-tool \
            -p tau-cli \
            -p tau-sandbox-native --bin tau-net-bridge
      - name: Build controlled-env binary
        run: |
          cargo build --release \
            --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml
      - name: Stage binaries into flat _artifacts directory
        # actions/upload-artifact@v7 preserves directory structure relative
        # to the workspace root. Without this staging step, downstream jobs
        # would see binaries under ./prebuilt/target/release/ and
        # ./prebuilt/crates/.../target/release/ — different roots break the
        # uniform `mv ./prebuilt/<name>` pattern downstream. Flattening into
        # _artifacts/ gives consumers a single predictable path.
        run: |
          mkdir -p _artifacts
          cp target/release/anthropic-plugin _artifacts/
          cp target/release/ollama-plugin _artifacts/
          cp target/release/openai-plugin _artifacts/
          cp target/release/fs-read-plugin _artifacts/
          cp target/release/shell-plugin _artifacts/
          cp target/release/echo-llm _artifacts/
          cp target/release/echo-tool _artifacts/
          cp target/release/tau _artifacts/
          cp target/release/tau-net-bridge _artifacts/
          cp crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env _artifacts/
      - name: Upload fixture binaries
        uses: actions/upload-artifact@v7
        with:
          name: linux-fixture-binaries
          retention-days: 1
          path: _artifacts/

  build-checks-linux:
    name: build-checks / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-test-support
        run: cargo build -p tau-plugin-test-support
      - name: Test tau-plugin-test-support
        run: cargo nextest run --profile ci -p tau-plugin-test-support --all-targets
      - name: Build tau-plugin-conformance
        run: cargo build -p tau-plugin-conformance
      - name: Build tau-plugin-compat
        run: cargo build -p tau-plugin-compat
      - name: Build tau-plugin-compat (integration-tests feature)
        run: cargo build -p tau-plugin-compat --features integration-tests --tests

  test-conformance:
    name: test (conformance)
    needs: [changes, build-fixtures-linux]
    if: needs.changes.outputs.skip_heavy_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "anthropic-plugin ollama-plugin openai-plugin"
      - name: Run conformance suite against all 3 plugins
        run: |
          cargo nextest run --profile ci -p anthropic --test conformance --no-capture
          cargo nextest run --profile ci -p ollama    --test conformance --no-capture
          cargo nextest run --profile ci -p openai    --test conformance --no-capture

  test-tau-plugin-compat:
    name: test (tau-plugin-compat / linux)
    needs: [changes, build-fixtures-linux]
    if: needs.changes.outputs.skip_heavy_jobs != 'true'
    runs-on: ubuntu-latest
    env:
      # GHA Linux runners ship both podman and docker. The xtask + adapter
      # probes both default to podman; pin to docker for the whole job so
      # plugin-compat tests run against the same runtime that xtask used to
      # build the images (image storage matches).
      TAU_CONTAINER_RUNTIME: docker
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "all"
      - name: Build tau binary (debug)
        # Layer 3 tests at crates/tau-plugin-compat/tests/layer3_check_sandbox.rs
        # hardcode the debug binary path (target/debug/tau). Build it here;
        # the 5 release plugin binaries still come from the artifact, which
        # is where the bulk of the time savings come from.
        run: cargo build -p tau-cli --bin tau
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - name: Build per-plugin images (sub-project I)
        run: cargo run -p xtask -- build-plugin-images
        env:
          # TAU_CONTAINER_RUNTIME is set at the job level. BUILDX_CACHE_*
          # are buildx-specific (docker buildx); xtask reads them and
          # forwards as --cache-from / --cache-to to the build call.
          BUILDX_CACHE_FROM: type=gha
          BUILDX_CACHE_TO: type=gha,mode=max
          BUILDKIT_PROGRESS: plain
          DOCKER_BUILDKIT: "1"
      - name: Test tau-plugin-compat (integration-tests feature)
        run: cargo nextest run --profile ci -p tau-plugin-compat --features integration-tests --tests --verbose

  test-tau-plugin-compat-layer4-ignored:
    # Promotes the 10 `#[ignore]`'d layer-4 sandbox boundary tests in
    # crates/tau-plugin-compat/tests/layer4_{native,container}.rs from
    # DARK to LIT (see docs/test-ignores-inventory.md bucket 2). Same
    # prerequisites as test-tau-plugin-compat (pre-built plugin binaries
    # + per-plugin Docker images on the container leg), but invoked
    # with `--run-ignored only` and scoped to the layer4 test target.
    #
    # `matrix.flavor` is workflow-defined ("native" | "container"), not
    # user input — no injection risk in the run: commands below.
    #
    # Plan: docs/superpowers/plans/2026-05-17-test-suite-upgrades.md
    # Task 11 ("Layer4 sandbox CI dark-spot").
    name: test (tau-plugin-compat / linux / layer4-ignored / ${{ matrix.flavor }})
    needs: [changes, build-fixtures-linux]
    if: needs.changes.outputs.skip_heavy_jobs != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [native, container]
    env:
      # Match the sister test-tau-plugin-compat job so adapter probes and
      # xtask image storage land in the same place (docker, not podman).
      TAU_CONTAINER_RUNTIME: docker
      FLAVOR: ${{ matrix.flavor }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "all"
      - name: Set up Docker buildx
        if: matrix.flavor == 'container'
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container
      - name: Build per-plugin images (sub-project I)
        if: matrix.flavor == 'container'
        run: cargo run -p xtask -- build-plugin-images
        env:
          BUILDX_CACHE_FROM: type=gha
          BUILDX_CACHE_TO: type=gha,mode=max
          BUILDKIT_PROGRESS: plain
          DOCKER_BUILDKIT: "1"
      - name: Run ignored layer4 tests
        # --run-ignored only runs ONLY the `#[ignore]`'d tests in the
        # target. --test layer4_<flavor> scopes the test binary so we
        # do not drag in unrelated targets. We deliberately do NOT pass
        # the `--tests` flag here: combining `--tests` (all test
        # targets) with `--test <name>` (one specific test target) lets
        # nextest pick up BOTH targets, defeating the per-flavor
        # filtering and causing the wrong-leg tests to fail on missing
        # prerequisites (e.g. native leg trying to run container tests
        # without docker images present).
        run: |
          cargo nextest run --profile ci \
            -p tau-plugin-compat \
            --features integration-tests \
            --run-ignored only \
            --test "layer4_$FLAVOR" \
            --verbose

  test-tau-sandbox-native-e2e:
    name: test (tau-sandbox-native e2e / linux)
    needs: [changes, build-fixtures-linux]
    if: needs.changes.outputs.skip_heavy_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "tau-controlled-env"
      - name: Test tau-sandbox-native e2e
        # strict_net_filter tests were replaced by strict_proxy tests (sub-project H,
        # ADR-0020). The proxy pattern needs no CAP_NET_ADMIN; all integration tests
        # run on this stock ubuntu-latest runner.
        run: cargo nextest run --profile ci -p tau-sandbox-native --features integration-tests --tests --verbose

  test-tau-runtime-e2e:
    name: test (tau-runtime e2e / linux)
    needs: [changes, build-fixtures-linux]
    if: needs.changes.outputs.skip_heavy_jobs != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "tau-controlled-env"
      - name: Test tau-runtime e2e
        run: cargo nextest run --profile ci -p tau-runtime --features integration-tests --tests --verbose

  # ci-summary moved to its own workflow (ci-summary.yml) so it
  # can fire on docs-only PRs too (where this workflow's
  # paths-ignore skips it entirely). See that file for the
  # aggregator logic.
