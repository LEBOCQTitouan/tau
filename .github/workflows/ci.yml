          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-pkg (no default features)
        run: cargo build -p tau-pkg --no-default-features
      - name: Test tau-pkg (no default features)
        run: cargo nextest run -p tau-pkg --no-default-features --lib

  no-default-features-runtime:
    name: build (tau-runtime no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-runtime (no default features)
        run: cargo build -p tau-runtime --no-default-features
      - name: Test tau-runtime (no default features)
        run: cargo nextest run -p tau-runtime --no-default-features --lib

  no-default-features-cli:
    name: build (tau-cli no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-cli (no default features)
        run: cargo build -p tau-cli --no-default-features
      - name: Test tau-cli (no default features)
        run: cargo nextest run -p tau-cli --no-default-features --lib

  no-default-features-protocol:
    name: build (tau-plugin-protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-protocol (no default features)
        run: cargo build -p tau-plugin-protocol --no-default-features
      - name: Test tau-plugin-protocol (no default features)
        run: cargo nextest run -p tau-plugin-protocol --no-default-features --lib

  no-default-features-sdk:
    name: build (tau-plugin-sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-sdk (no default features)
        run: cargo build -p tau-plugin-sdk --no-default-features
      - name: Test tau-plugin-sdk (no default features)
        run: cargo nextest run -p tau-plugin-sdk --no-default-features --lib

  build-tau-plugins:
    name: build (tau-plugins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build toy plugins (release)
        run: cargo build --release -p echo-llm -p echo-tool

  build-fixtures-linux:
    name: build-fixtures / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build all release-mode binaries
        run: |
          cargo build --release \
            -p anthropic -p ollama -p openai \
            -p fs-read -p shell \
            -p echo-llm -p echo-tool \
            -p tau-cli
      - name: Build controlled-env binary
        run: |
          cargo build --release \
            --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml
      - name: Stage binaries into flat _artifacts directory
        # actions/upload-artifact@v4 preserves directory structure relative
        # to the workspace root. Without this staging step, downstream jobs
        # would see binaries under ./prebuilt/target/release/ and
        # ./prebuilt/crates/.../target/release/ — different roots break the
        # uniform `mv ./prebuilt/<name>` pattern downstream. Flattening into
        # _artifacts/ gives consumers a single predictable path.
        run: |
          mkdir -p _artifacts
          cp target/release/anthropic-plugin _artifacts/
          cp target/release/ollama-plugin _artifacts/
          cp target/release/openai-plugin _artifacts/
          cp target/release/fs-read-plugin _artifacts/
          cp target/release/shell-plugin _artifacts/
          cp target/release/echo-llm _artifacts/
          cp target/release/echo-tool _artifacts/
          cp target/release/tau _artifacts/
          cp crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env _artifacts/
      - name: Upload fixture binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-fixture-binaries
          retention-days: 1
          path: _artifacts/

  build-anthropic-plugin:
    name: build (anthropic-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build anthropic-plugin (release)
        run: cargo build --release -p anthropic

  build-ollama-plugin:
    name: build (ollama-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build ollama-plugin (release)
        run: cargo build --release -p ollama

  build-openai-plugin:
    name: build (openai-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build openai-plugin (release)
        run: cargo build --release -p openai

  build-fs-read-plugin:
    name: build (fs-read-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build fs-read-plugin (release)
        run: cargo build --release -p fs-read

  build-shell-plugin:
    name: build (shell-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build shell-plugin (release)
        run: cargo build --release -p shell

  build-tau-plugin-test-support:
    name: build (tau-plugin-test-support)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-test-support
        run: cargo build -p tau-plugin-test-support
      - name: Test tau-plugin-test-support
        run: cargo nextest run -p tau-plugin-test-support --all-targets

  build-tau-plugin-conformance:
    name: build (tau-plugin-conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-conformance
        run: cargo build -p tau-plugin-conformance

  test-conformance:
    name: test (conformance)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place plugin binaries
        run: |
          mkdir -p target/release
          mv ./prebuilt/anthropic-plugin ./prebuilt/ollama-plugin ./prebuilt/openai-plugin \
             target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x target/release/anthropic-plugin target/release/ollama-plugin target/release/openai-plugin
          touch target/release/anthropic-plugin target/release/ollama-plugin target/release/openai-plugin
      - name: Run conformance suite against all 3 plugins
        run: |
          cargo nextest run -p anthropic --test conformance --no-capture
          cargo nextest run -p ollama    --test conformance --no-capture
          cargo nextest run -p openai    --test conformance --no-capture

  build-tau-plugin-compat:
    name: build (tau-plugin-compat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-compat
        run: cargo build -p tau-plugin-compat
      - name: Build tau-plugin-compat (integration-tests feature)
        run: cargo build -p tau-plugin-compat --features integration-tests --tests

  test-tau-plugin-compat:
    name: test (tau-plugin-compat / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place binaries at cargo-expected paths
        run: |
          mkdir -p target/release
          mv ./prebuilt/anthropic-plugin ./prebuilt/ollama-plugin ./prebuilt/openai-plugin \
             ./prebuilt/fs-read-plugin ./prebuilt/shell-plugin \
             ./prebuilt/echo-llm ./prebuilt/echo-tool \
             ./prebuilt/tau \
             target/release/
          mkdir -p crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release
          mv ./prebuilt/tau-controlled-env \
             crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x target/release/* \
                   crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
          # Touch to bump mtime above source files so cargo's freshness
          # check doesn't decide to rebuild.
          touch target/release/* \
                crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
      # FALLBACK (removed in Task C7 once green):
      # - name: Build tau binary first
      #   run: cargo build -p tau-cli --bin tau
      # - name: Build all real plugin binaries (Layer 4 tests)
      #   run: |
      #     cargo build -p anthropic --release
      #     cargo build -p ollama --release
      #     cargo build -p openai --release
      #     cargo build -p fs-read --release
      #     cargo build -p shell --release
      - name: Test tau-plugin-compat (integration-tests feature)
        run: cargo nextest run -p tau-plugin-compat --features integration-tests --tests --verbose

  test-tau-sandbox-native-e2e:
    name: test (tau-sandbox-native e2e / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place controlled-env binary
        run: |
          mkdir -p crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release
          mv ./prebuilt/tau-controlled-env \
             crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
          touch crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
      # FALLBACK (removed in Task C7):
      # - name: Build controlled-env binary
      #   run: cargo build --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml --release
      - name: Test tau-sandbox-native e2e
        run: cargo nextest run -p tau-sandbox-native --features integration-tests --tests --verbose

  test-tau-runtime-e2e:
    name: test (tau-runtime e2e / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - name: Download fixture binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-fixture-binaries
          path: ./prebuilt
      - name: Place controlled-env binary
        run: |
          mkdir -p crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release
          mv ./prebuilt/tau-controlled-env \
             crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/
          # actions/upload-artifact strips executable bits; restore them.
          chmod +x crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
          touch crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env
      # FALLBACK (removed in Task C7):
      # - name: Build controlled-env binary
      #   run: cargo build --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml --release
      - name: Test tau-runtime e2e
        run: cargo nextest run -p tau-runtime --features integration-tests --tests --verbose
