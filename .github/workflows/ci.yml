name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, "1.91"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  no-default-features:
    name: build (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build tau-domain (no default features)
        run: cargo build -p tau-domain --no-default-features
      - name: Test tau-domain (no default features)
        run: cargo test -p tau-domain --no-default-features --lib

  no-default-features-ports:
    name: build (tau-ports no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build tau-ports (no default features)
        run: cargo build -p tau-ports --no-default-features
      - name: Test tau-ports (no default features)
        run: cargo test -p tau-ports --no-default-features --lib

  test-fixtures-ports:
    name: test (tau-ports test-fixtures only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Test tau-ports (test-fixtures feature only)
        run: cargo test -p tau-ports --features test-fixtures

  no-default-features-pkg:
    name: build (tau-pkg no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build tau-pkg (no default features)
        run: cargo build -p tau-pkg --no-default-features
      - name: Test tau-pkg (no default features)
        run: cargo test -p tau-pkg --no-default-features --lib

  no-default-features-runtime:
    name: build (tau-runtime no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build tau-runtime (no default features)
        run: cargo build -p tau-runtime --no-default-features
      - name: Test tau-runtime (no default features)
        run: cargo test -p tau-runtime --no-default-features --lib

  no-default-features-cli:
    name: build (tau-cli no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build tau-cli (no default features)
        run: cargo build -p tau-cli --no-default-features
      - name: Test tau-cli (no default features)
        run: cargo test -p tau-cli --no-default-features --lib

  no-default-features-protocol:
    name: build (tau-plugin-protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build tau-plugin-protocol (no default features)
        run: cargo build -p tau-plugin-protocol --no-default-features
      - name: Test tau-plugin-protocol (no default features)
        run: cargo test -p tau-plugin-protocol --no-default-features --lib

  no-default-features-sdk:
    name: build (tau-plugin-sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build tau-plugin-sdk (no default features)
        run: cargo build -p tau-plugin-sdk --no-default-features
      - name: Test tau-plugin-sdk (no default features)
        run: cargo test -p tau-plugin-sdk --no-default-features --lib

  build-tau-plugins:
    name: build (tau-plugins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build toy plugins (release)
        run: cargo build --release -p echo-llm -p echo-tool

  build-anthropic-plugin:
    name: build (anthropic-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build anthropic-plugin (release)
        run: cargo build --release -p anthropic
