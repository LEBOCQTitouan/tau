name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable cargo's incremental compilation in CI. CI runs are fresh
  # each time; the Swatinem/rust-cache action restores `target/` and
  # `~/.cargo/{registry,git}` from the most recent main-branch run, so
  # cargo's *between-runs* caching is provided by the action. Disabling
  # incremental within a run makes outputs more deterministic for the
  # cache and avoids the sccache+incremental conflict (incremental
  # compilation embeds compilation-state metadata that sccache can't
  # deduplicate).
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          shared-key: linux-stable
          with-mold: true
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-stable:
    name: test-stable / ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          shared-key: ${{ matrix.os }}-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - run: cargo nextest run --workspace --all-targets
      - run: cargo test --workspace --doc

  msrv-check:
    name: msrv-check / ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.91"
          shared-key: ${{ matrix.os }}-1.91
          with-sccache: true
          with-mold: true
      - run: cargo check --workspace --all-targets --locked

  no-default-features:
    name: build (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-domain (no default features)
        run: cargo build -p tau-domain --no-default-features
      - name: Test tau-domain (no default features)
        run: cargo nextest run -p tau-domain --no-default-features --lib

  no-default-features-ports:
    name: build (tau-ports no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-ports (no default features)
        run: cargo build -p tau-ports --no-default-features
      - name: Test tau-ports (no default features)
        run: cargo nextest run -p tau-ports --no-default-features --lib

  test-fixtures-ports:
    name: test (tau-ports test-fixtures only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Test tau-ports (test-fixtures feature only)
        run: cargo nextest run -p tau-ports --features test-fixtures

  no-default-features-pkg:
    name: build (tau-pkg no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
