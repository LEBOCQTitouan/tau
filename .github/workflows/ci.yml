name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable cargo's incremental compilation in CI. CI runs are fresh
  # each time; the Swatinem/rust-cache action restores `target/` and
  # `~/.cargo/{registry,git}` from the most recent main-branch run, so
  # cargo's *between-runs* caching is provided by the action. Disabling
  # incremental within a run makes outputs more deterministic for the
  # cache and avoids the sccache+incremental conflict (incremental
  # compilation embeds compilation-state metadata that sccache can't
  # deduplicate).
  CARGO_INCREMENTAL: 0

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable, "1.91"]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.toolchain }}
          cache-key: test-${{ matrix.os }}-${{ matrix.toolchain }}
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc
      # Sandbox integration tests — Linux-only, ignored by default,
      # opt-in via the integration-tests feature.
      - if: matrix.os == 'ubuntu-latest'
        run: cargo test -p tau-sandbox-native --features integration-tests --tests -- --ignored
      - if: matrix.os == 'ubuntu-latest'
        run: cargo test -p tau-sandbox-container --tests -- --ignored
      - if: matrix.os == 'ubuntu-latest'
        run: cargo test -p tau-runtime --features integration-tests --tests -- --ignored

  no-default-features:
    name: build (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-domain (no default features)
        run: cargo build -p tau-domain --no-default-features
      - name: Test tau-domain (no default features)
        run: cargo test -p tau-domain --no-default-features --lib

  no-default-features-ports:
    name: build (tau-ports no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-ports (no default features)
        run: cargo build -p tau-ports --no-default-features
      - name: Test tau-ports (no default features)
        run: cargo test -p tau-ports --no-default-features --lib

  test-fixtures-ports:
    name: test (tau-ports test-fixtures only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Test tau-ports (test-fixtures feature only)
        run: cargo test -p tau-ports --features test-fixtures

  no-default-features-pkg:
    name: build (tau-pkg no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-pkg (no default features)
        run: cargo build -p tau-pkg --no-default-features
      - name: Test tau-pkg (no default features)
        run: cargo test -p tau-pkg --no-default-features --lib

  no-default-features-runtime:
    name: build (tau-runtime no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-runtime (no default features)
        run: cargo build -p tau-runtime --no-default-features
      - name: Test tau-runtime (no default features)
        run: cargo test -p tau-runtime --no-default-features --lib

  no-default-features-cli:
    name: build (tau-cli no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-cli (no default features)
        run: cargo build -p tau-cli --no-default-features
      - name: Test tau-cli (no default features)
        run: cargo test -p tau-cli --no-default-features --lib

  no-default-features-protocol:
    name: build (tau-plugin-protocol)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-plugin-protocol (no default features)
        run: cargo build -p tau-plugin-protocol --no-default-features
      - name: Test tau-plugin-protocol (no default features)
        run: cargo test -p tau-plugin-protocol --no-default-features --lib

  no-default-features-sdk:
    name: build (tau-plugin-sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-plugin-sdk (no default features)
        run: cargo build -p tau-plugin-sdk --no-default-features
      - name: Test tau-plugin-sdk (no default features)
        run: cargo test -p tau-plugin-sdk --no-default-features --lib

  build-tau-plugins:
    name: build (tau-plugins)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build toy plugins (release)
        run: cargo build --release -p echo-llm -p echo-tool

  build-anthropic-plugin:
    name: build (anthropic-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build anthropic-plugin (release)
        run: cargo build --release -p anthropic

  build-ollama-plugin:
    name: build (ollama-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build ollama-plugin (release)
        run: cargo build --release -p ollama

  build-openai-plugin:
    name: build (openai-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build openai-plugin (release)
        run: cargo build --release -p openai

  build-fs-read-plugin:
    name: build (fs-read-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build fs-read-plugin (release)
        run: cargo build --release -p fs-read

  build-shell-plugin:
    name: build (shell-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build shell-plugin (release)
        run: cargo build --release -p shell

  build-tau-plugin-test-support:
    name: build (tau-plugin-test-support)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-plugin-test-support
        run: cargo build -p tau-plugin-test-support
      - name: Test tau-plugin-test-support
        run: cargo test -p tau-plugin-test-support --all-targets

  build-tau-plugin-conformance:
    name: build (tau-plugin-conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-plugin-conformance
        run: cargo build -p tau-plugin-conformance

  test-conformance:
    name: test (conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Run conformance suite against all 3 plugins
        run: |
          cargo test -p anthropic --test conformance -- --nocapture
          cargo test -p ollama    --test conformance -- --nocapture
          cargo test -p openai    --test conformance -- --nocapture

  build-tau-plugin-compat:
    name: build (tau-plugin-compat)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau-plugin-compat
        run: cargo build -p tau-plugin-compat
      - name: Build tau-plugin-compat (integration-tests feature)
        run: cargo build -p tau-plugin-compat --features integration-tests --tests

  test-tau-plugin-compat:
    name: test (tau-plugin-compat / linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build tau binary first
        # Layer 3 tests spawn `tau resolve --check-sandbox` via the
        # CARGO_BIN_EXE_tau env var. Building tau-cli first ensures the
        # binary exists in target/debug for the helper to discover.
        run: cargo build -p tau-cli --bin tau
      - name: Build all real plugin binaries (Layer 4 tests)
        # Sub-project D Task 5/6/7's Layer 4 tests need the real plugin
        # binaries pre-built. Build the 5 real plugins in release mode.
        run: |
          cargo build -p anthropic --release
          cargo build -p ollama --release
          cargo build -p openai --release
          cargo build -p fs-read --release
          cargo build -p shell --release
      - name: Test tau-plugin-compat (integration-tests feature)
        # Layer 3 tests run; 7 of 10 Layer 4 tests run after sub-project D
        # (4 tool-plugin × 2 adapters + 3 native HTTP plugin via cassette);
        # 3 container × HTTP plugin tests stay #[ignore]'d pending F.
        run: cargo test -p tau-plugin-compat --features integration-tests --tests

  test-tau-sandbox-native-e2e:
    name: test (tau-sandbox-native e2e / linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build controlled-env binary
        # Sub-project D's e2e tests use this binary as a deterministic
        # spawn target. Built in release mode with static linking
        # (lto + strip + panic=abort) per its standalone Cargo.toml.
        run: cargo build --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml --release
      - name: Test tau-sandbox-native e2e
        # Real-kernel landlock + seccomp + network-filter tests gated
        # cfg(feature = "integration-tests") + cfg(target_os = "linux").
        run: cargo test -p tau-sandbox-native --features integration-tests --tests

  test-tau-runtime-e2e:
    name: test (tau-runtime e2e / linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Build controlled-env binary
        run: cargo build --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml --release
      - name: Test tau-runtime e2e
        # Runtime-level integration tests: adapter threads through to
        # plugin spawn; sandbox plan validation runs pre-spawn.
        run: cargo test -p tau-runtime --features integration-tests --tests
