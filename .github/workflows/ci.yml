name: CI

on:
  push:
    branches: [main]
  pull_request:
    # Skip the full Rust matrix on pure-docs PRs. Branch protection
    # should require the ci-summary job (defined at the end of this
    # file), which reports success when all real jobs pass OR when
    # they all skip (the docs-only case). Docs-only PRs still get the
    # docs-check workflow as a gate.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs-*.yml'

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable cargo's incremental compilation in CI. CI runs are fresh
  # each time; the Swatinem/rust-cache action restores `target/` and
  # `~/.cargo/{registry,git}` from the most recent main-branch run, so
  # cargo's *between-runs* caching is provided by the action. Disabling
  # incremental within a run makes outputs more deterministic for the
  # cache and avoids the sccache+incremental conflict (incremental
  # compilation embeds compilation-state metadata that sccache can't
  # deduplicate).
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          shared-key: linux-stable
          with-mold: true
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    name: cargo-deny / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # check advisories + licenses + bans + sources per deny.toml at repo root.
          arguments: --all-features

  test-stable:
    name: test-stable / ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          shared-key: ${{ matrix.os }}-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - run: cargo nextest run --profile ci --workspace --all-targets

  doc-tests:
    name: doc-tests / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      # Doctests are serial-per-binary in cargo and don't exercise
      # OS-specific paths in this workspace. Linux-only run is enough.
      - run: cargo test --workspace --doc

  msrv-check:
    name: msrv-check / ${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'windows' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.91"
          shared-key: ${{ matrix.os }}-1.91
          with-sccache: true
          with-mold: true
      - run: cargo check --workspace --all-targets --locked

  test-fixtures-ports:
    name: test-fixtures-ports / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Test tau-ports (test-fixtures feature only)
        run: cargo nextest run --profile ci -p tau-ports --features test-fixtures
      - name: Doctests tau-ports (test-fixtures feature only)
        # Workspace-level `cargo test --workspace --doc` (test-stable job)
        # runs doctests without features; the fixtures module is gated
        # behind `test-fixtures`, so its doctests only compile here.
        run: cargo test --doc -p tau-ports --features test-fixtures

  feature-flag-matrix:
    name: feature-flag-matrix / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-sccache: true
          with-mold: true
      - name: Check each crate with --no-default-features
        run: |
          set -e
          for crate in tau-domain tau-ports tau-pkg tau-runtime tau-cli tau-plugin-protocol tau-plugin-sdk; do
            echo "::group::$crate"
            cargo check -p "$crate" --no-default-features
            echo "::endgroup::"
          done

  build-fixtures-linux:
    name: build-fixtures / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Build all release-mode binaries
        run: |
          cargo build --release \
            -p anthropic -p ollama -p openai \
            -p fs-read -p shell \
            -p echo-llm -p echo-tool \
            -p tau-cli
      - name: Build controlled-env binary
        run: |
          cargo build --release \
            --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml
      - name: Stage binaries into flat _artifacts directory
        # actions/upload-artifact@v4 preserves directory structure relative
        # to the workspace root. Without this staging step, downstream jobs
        # would see binaries under ./prebuilt/target/release/ and
        # ./prebuilt/crates/.../target/release/ — different roots break the
        # uniform `mv ./prebuilt/<name>` pattern downstream. Flattening into
        # _artifacts/ gives consumers a single predictable path.
        run: |
          mkdir -p _artifacts
          cp target/release/anthropic-plugin _artifacts/
          cp target/release/ollama-plugin _artifacts/
          cp target/release/openai-plugin _artifacts/
          cp target/release/fs-read-plugin _artifacts/
          cp target/release/shell-plugin _artifacts/
          cp target/release/echo-llm _artifacts/
          cp target/release/echo-tool _artifacts/
          cp target/release/tau _artifacts/
          cp crates/tau-plugin-compat/fixtures/controlled-env-binary/target/release/tau-controlled-env _artifacts/
      - name: Upload fixture binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-fixture-binaries
          retention-days: 1
          path: _artifacts/

  build-checks-linux:
    name: build-checks / linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Build tau-plugin-test-support
        run: cargo build -p tau-plugin-test-support
      - name: Test tau-plugin-test-support
        run: cargo nextest run --profile ci -p tau-plugin-test-support --all-targets
      - name: Build tau-plugin-conformance
        run: cargo build -p tau-plugin-conformance
      - name: Build tau-plugin-compat
        run: cargo build -p tau-plugin-compat
      - name: Build tau-plugin-compat (integration-tests feature)
        run: cargo build -p tau-plugin-compat --features integration-tests --tests

  test-conformance:
    name: test (conformance)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "anthropic-plugin ollama-plugin openai-plugin"
      - name: Run conformance suite against all 3 plugins
        run: |
          cargo nextest run --profile ci -p anthropic --test conformance --no-capture
          cargo nextest run --profile ci -p ollama    --test conformance --no-capture
          cargo nextest run --profile ci -p openai    --test conformance --no-capture

  test-tau-plugin-compat:
    name: test (tau-plugin-compat / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    env:
      # GHA Linux runners ship both podman and docker. The xtask + adapter
      # probes both default to podman; pin to docker for the whole job so
      # plugin-compat tests run against the same runtime that xtask used to
      # build the images (image storage matches).
      TAU_CONTAINER_RUNTIME: docker
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "all"
      - name: Build tau binary (debug)
        # Layer 3 tests at crates/tau-plugin-compat/tests/layer3_check_sandbox.rs
        # hardcode the debug binary path (target/debug/tau). Build it here;
        # the 5 release plugin binaries still come from the artifact, which
        # is where the bulk of the time savings come from.
        run: cargo build -p tau-cli --bin tau
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
      - name: Build per-plugin images (sub-project I)
        run: cargo run -p xtask -- build-plugin-images
        env:
          # TAU_CONTAINER_RUNTIME is set at the job level. BUILDX_CACHE_*
          # are buildx-specific (docker buildx); xtask reads them and
          # forwards as --cache-from / --cache-to to the build call.
          BUILDX_CACHE_FROM: type=gha
          BUILDX_CACHE_TO: type=gha,mode=max
          BUILDKIT_PROGRESS: plain
          DOCKER_BUILDKIT: "1"
      - name: Test tau-plugin-compat (integration-tests feature)
        run: cargo nextest run --profile ci -p tau-plugin-compat --features integration-tests --tests --verbose

  test-tau-sandbox-native-e2e:
    name: test (tau-sandbox-native e2e / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "tau-controlled-env"
      - name: Test tau-sandbox-native e2e
        # strict_net_filter tests were replaced by strict_proxy tests (sub-project H,
        # ADR-0020). The proxy pattern needs no CAP_NET_ADMIN; all integration tests
        # run on this stock ubuntu-latest runner.
        run: cargo nextest run --profile ci -p tau-sandbox-native --features integration-tests --tests --verbose

  test-tau-runtime-e2e:
    name: test (tau-runtime e2e / linux)
    needs: build-fixtures-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-nextest: true
          with-mold: true
      - uses: ./.github/actions/place-fixture-binaries
        with:
          binaries: "tau-controlled-env"
      - name: Test tau-runtime e2e
        run: cargo nextest run --profile ci -p tau-runtime --features integration-tests --tests --verbose

  # Aggregate gate. Required by branch protection in place of the
  # per-job entries. Reports success when every dep passes OR when
  # every dep is skipped (the docs-only `paths-ignore` case). A
  # failure or cancellation in any dep fails this job.
  ci-summary:
    name: ci-summary
    if: always()
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - cargo-deny
      - test-stable
      - doc-tests
      - msrv-check
      - test-fixtures-ports
      - feature-flag-matrix
      - build-fixtures-linux
      - build-checks-linux
      - test-conformance
      - test-tau-plugin-compat
      - test-tau-sandbox-native-e2e
      - test-tau-runtime-e2e
    steps:
      - name: Verify all required jobs passed or skipped
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON"
          if echo "$NEEDS_JSON" | jq -e 'to_entries | map(select(.value.result != "success" and .value.result != "skipped")) | length > 0' >/dev/null; then
            echo "::error::One or more required jobs failed or were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped (docs-only PR)."
