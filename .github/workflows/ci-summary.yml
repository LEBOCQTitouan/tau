name: CI summary

# Branch-protection-required aggregate check.
#
# Two trigger paths:
#
#   1. `workflow_run` after `CI` completes — authoritative for code
#      PRs (where ci.yml fired). Reports the CI run's conclusion as
#      this job's status. CI passing → ci-summary success; CI failing
#      → ci-summary failure.
#
#   2. `pull_request` — provisional success for every PR. Handles
#      docs-only PRs where ci.yml's `paths-ignore` skipped it entirely
#      (no `workflow_run` event will fire). For code PRs the
#      provisional success is later superseded by the workflow_run-
#      triggered run; auto-merge waits for the latest status anyway.
#
# Branch protection on `main` requires the `ci-summary` check. With
# this two-trigger setup:
#   - Code PR: ci.yml runs all 14 jobs → workflow_run fires →
#     ci-summary reports CI's conclusion → merge gated on it.
#   - Docs PR: ci.yml skipped → only pull_request fires → ci-summary
#     succeeds → docs PR merges without dragging the Rust matrix.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  pull_request:

permissions:
  contents: read

jobs:
  ci-summary:
    name: ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        env:
          EVENT: ${{ github.event_name }}
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [[ "$EVENT" == "workflow_run" ]]; then
            # Authoritative path: ci.yml just completed.
            if [[ "$CI_CONCLUSION" == "success" ]]; then
              echo "CI workflow succeeded."
              exit 0
            elif [[ "$CI_CONCLUSION" == "skipped" || "$CI_CONCLUSION" == "neutral" ]]; then
              echo "CI workflow conclusion: $CI_CONCLUSION (treated as success)."
              exit 0
            else
              echo "::error::CI workflow concluded with: $CI_CONCLUSION"
              exit 1
            fi
          else
            # Provisional path: PR event. If ci.yml is going to run
            # (code paths), the workflow_run-triggered ci-summary
            # will supersede this status with the real conclusion.
            # If ci.yml is paths-ignore-skipped (docs-only PR), this
            # succeeds and unblocks branch protection.
            echo "PR event: provisional success (workflow_run will supersede if CI fires)."
            exit 0
          fi
