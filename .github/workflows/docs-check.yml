name: docs-check

on:
  pull_request:
    paths:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs-*.yml'

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: mdbook build + linkcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache mdBook binaries
        id: cache-mdbook
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-linkcheck
            ~/.cargo/bin/mdbook-mermaid
          key: mdbook-${{ runner.os }}-mdbook-0.4-linkcheck-0.7-mermaid-0.14

      - name: Install mdBook
        if: steps.cache-mdbook.outputs.cache-hit != 'true'
        run: |
          cargo install mdbook --locked --version ^0.4
          cargo install mdbook-linkcheck --locked --version ^0.7
          cargo install mdbook-mermaid --locked --version ^0.14

      - name: Build docs
        working-directory: docs
        run: mdbook build

      - name: Upload built site as artifact (debugging)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docs-build-failed
          path: docs/book/
          if-no-files-found: ignore
          retention-days: 7
