name: probe-userns-net

# One-off probe to verify GHA ubuntu-latest supports unprivileged userns + netns
# + AF_NETLINK + veth — prerequisites for sub-project F's e2e tests.
# Triggered manually via workflow_dispatch. Result determines F's CI strategy.

on:
  workflow_dispatch:
  # Also trigger on pushes to the verification branch — workflow_dispatch
  # only works for workflows already on the default branch.
  push:
    branches:
      - feat/f-probe-verification

jobs:
  probe-host:
    name: probe (host runner)
    runs-on: ubuntu-latest
    continue-on-error: true  # expected to fail; documents the GHA restriction
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-stable
          with-mold: true
      - name: Run probe on host runner
        run: |
          cargo test -p tau-sandbox-native --test probe_userns_net_caps -- --ignored --nocapture

  probe-privileged-docker:
    name: probe (privileged docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run probe inside privileged Docker container
        # Privileged container has full root + CAP_NET_ADMIN + can write
        # /proc/self/uid_map. This validates approach B for sub-project F's
        # CI strategy: e2e tests run inside privileged Docker.
        run: |
          docker run --rm --privileged \
            -v "$PWD":/workspace \
            -w /workspace \
            rust:1.95-bookworm \
            bash -c '
              set -e
              apt-get update -qq
              apt-get install -y -qq iproute2 nftables
              cargo test -p tau-sandbox-native --test probe_userns_net_caps -- --ignored --nocapture
            '
