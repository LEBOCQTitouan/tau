name: coverage

# Measurement, not gating. Coverage is a signal to inform refactors and
# spot zero-coverage modules; never a hard threshold. See
# docs/superpowers/plans/2026-05-17-test-suite-upgrades.md Task 13
# rationale ("setting a hard coverage threshold gate ... incentivizes
# test-for-coverage-not-correctness").
#
# Untrusted user input safety: the only ${{ ... }} expansion in run:
# steps is ${{ github.sha }} (a git commit hash) in the artifact name,
# which is not user-controllable. No issue/PR title / body / commit
# message text reaches a shell. See the workflow-injection hardening
# guide before adding any new expansion.

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/docs-*.yml'
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  coverage:
    name: cargo llvm-cov nextest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: stable
          components: llvm-tools-preview
          shared-key: linux-stable
          with-nextest: true
          with-sccache: true
          with-mold: true
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate lcov coverage
        # `--workspace --no-fail-fast` mirrors test-stable / linux so we
        # measure exactly what that job exercises. Doctests are not
        # included (nextest doesn't run doctests); add a doctest leg
        # later if doc examples become a coverage focus.
        run: |
          cargo llvm-cov nextest \
            --workspace --no-fail-fast \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|/target/|/build\.rs$)'
      - name: Summarise coverage
        # Extract overall line-coverage percent from lcov.info and post
        # to the job summary. No external service required.
        run: |
          covered=$(grep -h '^DA:' lcov.info | awk -F, '$2!="0"{c++} END{print c+0}')
          total=$(grep -h '^DA:' lcov.info | wc -l)
          if [ "$total" -gt 0 ]; then
            pct=$(awk "BEGIN{printf \"%.1f\", ($covered/$total)*100}")
          else
            pct="0.0"
          fi
          {
            echo "## Coverage baseline"
            echo
            echo "- **Line coverage:** ${pct}% (${covered} / ${total})"
            echo "- LCOV artifact attached to this run."
            echo
            echo "Coverage is a signal, not a gate."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov-${{ github.sha }}
          path: lcov.info
          retention-days: 14
