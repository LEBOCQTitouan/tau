# Dependabot configuration.
#
# Manages dependency updates for GitHub Actions and the Cargo workspace.
# Each ecosystem opens PRs against `main` on the schedule below; PRs run
# through the standard CI gate before merge.

version: 2
updates:
  # GitHub Actions versions used in .github/workflows/ and .github/actions/.
  # Weekly cadence balances signal (timely patch updates) against PR noise.
  # Auto-bumps `uses: <owner>/<action>@<ref>` entries — works for both tag
  # refs (e.g. @v4) and SHA pins. Pairs with the audit recommendation
  # (PR #70) to SHA-pin third-party actions once Dependabot is wired.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels:
      - dependencies
      - github-actions

  # Cargo workspace dependencies. Daily schedule because a Rust security
  # advisory needs faster turnaround than a workflow action bump. Limit
  # of 10 open PRs caps noise; group lockfile-only updates so each is a
  # single PR per direct-dep family.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
      - rust
    groups:
      # Bundle patch + minor lockfile bumps of the same crate family.
      # Major bumps still open one PR each (the default).
      tokio:
        patterns:
          - "tokio*"
      serde:
        patterns:
          - "serde*"
      tracing:
        patterns:
          - "tracing*"
