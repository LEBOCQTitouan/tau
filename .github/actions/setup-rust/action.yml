name: Setup Rust
description: |
  Install a Rust toolchain (with optional components) and configure
  caching, optional cargo-nextest, sccache, and mold linker. Saves cache
  only on main-branch pushes; PRs read-only.

inputs:
  toolchain:
    description: Rust toolchain version (stable, 1.91, master, etc.)
    required: false
    default: stable
  components:
    description: Comma-separated list of components (rustfmt, clippy)
    required: false
    default: ""
  shared-key:
    description: |
      rust-cache shared-key. Pinned per (os, toolchain). All jobs with
      the same shared-key share one cache entry. Recommended pattern:
      "<os>-<toolchain>", e.g. "linux-stable", "windows-1.91".
    required: false
    default: ""
  cache-key:
    description: |
      DEPRECATED: passed to rust-cache's `key:` parameter as a suffix.
      When `shared-key` is also set, the effective key becomes
      `{shared-key}-{cache-key}`. Use `shared-key` instead; this input
      will be removed after all callers migrate.
    required: false
    default: ""
  with-nextest:
    description: Install cargo-nextest (true / false)
    required: false
    default: "false"
  with-sccache:
    description: Install sccache and set RUSTC_WRAPPER (true / false)
    required: false
    default: "false"
  with-mold:
    description: |
      Install the mold linker (Linux only) and set RUSTFLAGS to use it.
      Ignored on non-Linux runners.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}

    - name: Install mold linker (Linux only)
      if: inputs.with-mold == 'true' && runner.os == 'Linux'
      uses: rui314/setup-mold@v1

    # sccache install via taiki-e/install-action instead of
    # mozilla-actions/sccache-action@v0.0.10. The mozilla action has a
    # pre/main/post-step state bug that intermittently fails on Windows
    # with `Unable to locate executable file: undefined` — the post-step
    # can't find the executable path the install step recorded. taiki-e
    # just downloads the binary and adds it to PATH (deterministic; same
    # mechanism we use for cargo-nextest). We lose the mozilla action's
    # post-step stats annotations, but the cache still works — the
    # SCCACHE_GHA_ENABLED env var below is what activates the GitHub
    # Actions Cache backend, regardless of installer.
    - name: Install sccache
      if: inputs.with-sccache == 'true'
      uses: taiki-e/install-action@v2
      with:
        tool: sccache

    - name: Configure sccache env
      if: inputs.with-sccache == 'true'
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
        # ACTIONS_RESULTS_URL + ACTIONS_RUNTIME_TOKEN are already set by
        # the runner; sccache reads them via SCCACHE_GHA_ENABLED.

    - name: Install cargo-nextest
      if: inputs.with-nextest == 'true'
      uses: taiki-e/install-action@v2
      with:
        tool: nextest

    - name: Cache cargo registry, target, and sccache
      uses: Swatinem/rust-cache@v2
      with:
        # `shared-key` enables cross-job cache sharing per (os, toolchain).
        # The deprecated `key` input acts as a suffix when both are set
        # (effective key = `{shared-key}-{key}`); pure-`key` callers retain
        # legacy per-job caching. Removed once all callers migrate.
        shared-key: ${{ inputs.shared-key }}
        key: ${{ inputs.cache-key }}
        # Save the cache only when running on main (push events to main).
        # PRs restore but don't write — keeps cache stable + avoids
        # PR-specific bloat AND prevents write contention between
        # parallel jobs sharing a key.
        save-if: ${{ github.ref == 'refs/heads/main' }}
