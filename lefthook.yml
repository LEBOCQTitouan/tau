# lefthook.yml — automatic pre-commit + pre-push gate for tau
#
# Goal: catch cross-platform build/runtime issues locally before
# pushing, so CI is confirmation rather than discovery.
#
# Two tiers, both automatic, no manual scripts:
#   - pre-commit: fast host checks (~30-60s, parallel)
#   - pre-push:   deep Linux gate (~3-5min cold, ~20s warm via cache)
#
# Install: `lefthook install` (after `brew install lefthook`)
# Bypass for emergencies: `git commit --no-verify` / `git push --no-verify`
#
# Cargo target dirs are isolated per command per CLAUDE.md Rule 1:
#   target/lefthook/fmt
#   target/lefthook/clippy
#   target/lefthook/test
#   target/lefthook/check-linux
#   target/lefthook-podman   (inside container; mounted as named volume)
#
# These do NOT collide with target/main (main agent) or
# target/agent-* (sub-agents).
#
# Cross-compile prerequisite (one-time setup):
#   brew install filosottile/musl-cross/musl-cross   # x86_64 included by default
#   rustup target add x86_64-unknown-linux-musl
# See .cargo/config.toml for the linker + CC env configuration.

pre-commit:
  parallel: true
  commands:
    fmt:
      # `cargo fmt` only acts on Rust files — narrower glob than the
      # sibling commands is intentional, not an oversight.
      glob: "*.rs"
      run: env CARGO_TARGET_DIR=target/lefthook/fmt cargo fmt --all -- --check
    clippy:
      glob: "*.{rs,toml}"
      run: env CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=target/lefthook/clippy cargo clippy --workspace --all-targets -- -D warnings
    test-native:
      glob: "*.{rs,toml}"
      # env -u CARGO_TARGET_DIR: unset the var so child `cargo build`
      # invocations spawned by tests are NOT redirected. Two test suites
      # spawn nested cargo builds at runtime:
      #   - tau-cli cmd_chat builds echo-llm and expects the binary at
      #     $CARGO_TARGET_DIR/release/echo-llm (locate_target_dir heuristic)
      #   - tau-pkg install builds a plugin at <plugin-dir>/target/release/
      #     and looks there regardless of CARGO_TARGET_DIR
      # An inherited CARGO_TARGET_DIR breaks both. Unset the var and pass
      # --target-dir to nextest itself so only nextest's own output is
      # isolated; child cargo processes see no override and use defaults.
      run: bash -c 'unset CARGO_TARGET_DIR && env CARGO_INCREMENTAL=0 cargo nextest run --workspace --all-targets --target-dir target/lefthook/test'
    check-linux-x86:
      glob: "*.{rs,toml}"
      # Uses x86_64-unknown-linux-musl (not -gnu) because macOS lacks
      # a glibc-compatible cross-compiler. Musl catches the same
      # cfg-gating issues (std::os::unix::*, linux-only APIs, etc.).
      # Linker + CC configured in .cargo/config.toml; requires:
      #   brew install filosottile/musl-cross/musl-cross   # x86_64 included by default
      run: env CARGO_INCREMENTAL=0 CARGO_TARGET_DIR=target/lefthook/check-linux cargo check --workspace --all-targets --target x86_64-unknown-linux-musl

pre-push:
  commands:
    deep-gate:
      # Privileged Linux container running every Linux CI job locally so
      # `git push` only proceeds when the same checks remote CI runs would
      # also pass. Selective caps mirror what tau's strict-tier sandbox
      # documents (see docs/decisions/0019-per-host-network-filter.md):
      #   --cap-add SYS_ADMIN          (uid_map writes after CLONE_NEWUSER)
      #   --cap-add NET_ADMIN          (veth + nftables for net filter)
      #   --security-opt seccomp=unconfined  (let tau install its own)
      #   --security-opt apparmor=unconfined (avoid distro AppArmor blocks)
      #
      # Bind-mounts:
      #   $PWD                        — workspace
      #   cargo-cache (volume)        — registry index + crates
      #   target-cache (volume)       — incremental rustc artifacts
      #   /run/podman/podman.sock     — DooD (xtask + plugin-compat tests
      #                                  spawn nested containers)
      #
      # Coverage — every Linux CI job is reproduced inside this single
      # container so local pre-push gives the same answer as remote CI:
      #   1. msrv-check / linux        — cargo check at MSRV (rust 1.91)
      #   2. test-fixtures-ports/linux — cargo nextest -p tau-ports --features test-fixtures
      #   3. feature-flag-matrix/linux — cargo check per-crate --no-default-features
      #   4. build-fixtures / linux    — release binaries (consumed by jobs 6, 7, 8, 10)
      #   5. test-stable / linux       — cargo nextest --workspace --all-targets + doctests
      #   6. test (conformance)        — plugin conformance suite
      #   7. test (tau-runtime e2e)    — runtime e2e tests
      #   8. test (sandbox-native e2e) — sandbox-native e2e tests
      #   9. xtask-plugin-images       — DooD-built per-plugin Docker images
      #  10. test (tau-plugin-compat)  — integration-tests feature
      #
      # Cost: ~3-4 min warm, ~15-20 min cold. Bypass for emergencies:
      # `git push --no-verify`.
      run: |
        # Worktree support: in a linked worktree, .git is a file pointing
        # to <main>/.git/worktrees/<slug>. The container bind-mounts the
        # worktree as /workspace but cannot otherwise resolve that
        # pointer. Bind-mount the git-common-dir at the same absolute
        # path inside the container so the pointer resolves. No-op for
        # normal-checkout invocations (where the paths match).
        GIT_COMMON_DIR_ABS="$(cd "$(git rev-parse --git-common-dir)" && pwd -P)"
        EXTRA_MOUNTS=()
        if [ "$GIT_COMMON_DIR_ABS" != "$PWD/.git" ]; then
          EXTRA_MOUNTS+=("-v" "$GIT_COMMON_DIR_ABS:$GIT_COMMON_DIR_ABS")
        fi
        podman run --rm \
          "${EXTRA_MOUNTS[@]}" \
          --cap-add SYS_ADMIN --cap-add NET_ADMIN \
          --security-opt seccomp=unconfined \
          --security-opt apparmor=unconfined \
          --security-opt label=disable \
          -v "$PWD":/workspace \
          -v cargo-cache:/usr/local/cargo/registry \
          -v target-cache:/workspace/target/lefthook-podman \
          -v /run/podman/podman.sock:/var/run/podman.sock \
          -w /workspace \
          -e CONTAINER_HOST=unix:///var/run/podman.sock \
          -e TAU_CONTAINER_RUNTIME=podman \
          docker.io/library/rust:1.82-bookworm \
          bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq iproute2 nftables podman

            # Install cargo-nextest (not bundled with the rust image).
            if ! command -v cargo-nextest >/dev/null; then
              ARCH=$(uname -m)
              case "$ARCH" in
                aarch64) NEXTEST_URL="https://get.nexte.st/latest/linux-arm" ;;
                *)       NEXTEST_URL="https://get.nexte.st/latest/linux" ;;
              esac
              curl -LsSf "$NEXTEST_URL" | tar zxf - -C /usr/local/cargo/bin
            fi

            # Use --target-dir (not CARGO_TARGET_DIR env) so child `cargo build`
            # calls spawned by tests are not redirected to the wrong path.
            # See pre-commit test-native comment for the full explanation.
            export CARGO_INCREMENTAL=0
            unset CARGO_TARGET_DIR
            TARGET=target/lefthook-podman

            # ─── 1. msrv-check / linux ────────────────────────────
            # CI MSRV pin is 1.91 (see ci.yml). Install + use rustup
            # to invoke it inline so we do not pollute the default
            # toolchain in the persistent volume.
            echo "::group::msrv-check"
            rustup toolchain install 1.91 --profile minimal --no-self-update >/dev/null
            cargo +1.91 check --workspace --all-targets --locked --target-dir $TARGET
            echo "::endgroup::"

            # ─── 2. test-fixtures-ports / linux ───────────────────
            echo "::group::test-fixtures-ports"
            cargo nextest run -p tau-ports --features test-fixtures --target-dir $TARGET
            echo "::endgroup::"

            # ─── 3. feature-flag-matrix / linux ───────────────────
            echo "::group::feature-flag-matrix"
            for crate in tau-domain tau-ports tau-pkg tau-runtime tau-cli tau-plugin-protocol tau-plugin-sdk; do
              cargo check -p "$crate" --no-default-features --target-dir $TARGET
            done
            echo "::endgroup::"

            # ─── 4. build-fixtures / linux ────────────────────────
            # Release binaries consumed by jobs 6, 7, 8, 10.
            echo "::group::build-fixtures"
            cargo build --release \
              -p anthropic -p ollama -p openai \
              -p fs-read -p shell \
              -p echo-llm -p echo-tool \
              -p tau-cli \
              -p tau-sandbox-native --bin tau-net-bridge \
              --target-dir $TARGET
            cargo build --release \
              --manifest-path crates/tau-plugin-compat/fixtures/controlled-env-binary/Cargo.toml
            echo "::endgroup::"

            # CI places the fixture binaries at canonical workspace-root
            # target/release/. Copy them so tests find them via
            # locate_plugin_bin'"'"'s default search path.
            mkdir -p target/release
            for bin in anthropic-plugin ollama-plugin openai-plugin fs-read-plugin shell-plugin echo-llm echo-tool tau tau-net-bridge; do
              cp -f "$TARGET/release/$bin" "target/release/$bin" 2>/dev/null || true
            done

            # ─── 5. test-stable / linux ────────────────────────────
            echo "::group::test-stable"
            cargo nextest run --workspace --all-targets --target-dir $TARGET
            cargo test --workspace --doc --target-dir $TARGET
            echo "::endgroup::"

            # ─── 6. test (conformance) ────────────────────────────
            # CI runs the conformance suite against each HTTP plugin
            # individually via its `--test conformance` integration test.
            echo "::group::test-conformance"
            for plugin in anthropic ollama openai; do
              cargo nextest run -p "$plugin" --test conformance --target-dir $TARGET
            done
            echo "::endgroup::"

            # ─── 7. test (tau-runtime e2e) ────────────────────────
            echo "::group::test-tau-runtime-e2e"
            cargo nextest run -p tau-runtime --features integration-tests --tests --target-dir $TARGET
            echo "::endgroup::"

            # ─── 8. test (tau-sandbox-native e2e) ─────────────────
            echo "::group::test-tau-sandbox-native-e2e"
            cargo nextest run -p tau-sandbox-native --features integration-tests --tests --target-dir $TARGET
            echo "::endgroup::"

            # ─── 9. xtask-plugin-images (DooD) ────────────────────
            # The container has /var/run/podman.sock bind-mounted; xtask
            # uses TAU_CONTAINER_RUNTIME=podman + the bind-mounted socket
            # for nested container spawn. `--target-dir` is a cargo
            # option, must precede `--`.
            echo "::group::xtask-plugin-images"
            cargo run --target-dir $TARGET -p xtask -- build-plugin-images
            echo "::endgroup::"

            # ─── 10. test (tau-plugin-compat / linux) ─────────────
            echo "::group::test-plugin-compat"
            cargo nextest run -p tau-plugin-compat --features integration-tests --tests --target-dir $TARGET
            echo "::endgroup::"
          '
