[book]
title = "tau"
description = "tau — agentic Rust runtime. Documentation."
authors = ["tau contributors"]
language = "en"
multilingual = false
src = "."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/titouanlebocq/tau"
edit-url-template = "https://github.com/titouanlebocq/tau/edit/main/docs/{path}"
no-section-label = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.linkcheck]
follow-web-links = false
warning-policy = "error"
traverse-parent-directories = true
# Process artifacts (specs, plans, retrospectives) live in the repo
# but are not part of the published book. Skip linkcheck for any link
# whose URL points into those trees so we don't drag them into SUMMARY.
exclude = [
  "superpowers/.*",
  "retrospectives/.*",
]
